name: Publish crates

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # stable
        with:
          toolchain: stable
      - name: Publish in topological order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          for crate in aex-core aex-identity aex-audit aex-scanner aex-policy aex-tunnel aex-billing aex-control-plane; do
            echo "::group::Publish $crate"
            (cd crates/$crate && cargo publish --token "$CARGO_REGISTRY_TOKEN" --allow-dirty || true)
            # Dependencies need to settle in crates.io index before the next one.
            sleep 30
            echo "::endgroup::"
          done

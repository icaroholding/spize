name: Publish crates

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: dtolnay/rust-toolchain@21dc36fb71dd22e3317045c0c31a3f4249868b17  # stable
        with:
          toolchain: stable
      - name: Publish in topological order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          for crate in aex-core aex-identity aex-audit aex-scanner aex-policy aex-tunnel aex-billing aex-data-plane aex-control-plane; do
            echo "::group::Publish $crate"
            (cd crates/$crate && cargo publish --token "$CARGO_REGISTRY_TOKEN" --allow-dirty || true)
            # Dependencies need to settle in crates.io index before the next one.
            sleep 30
            echo "::endgroup::"
          done

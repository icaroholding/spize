name: Publish PyPI

# Auto-publish on tag push (v*) and manual replay via the GitHub UI /
# `gh workflow run`. Manual replay accepts a `tag` input so a stuck
# release can be re-published from any commit without cutting a new
# tag — the workflow checks out THAT tag and rebuilds.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v1.3.0-beta.2). Defaults to the workflow ref.'
        required: false
        default: ''

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target tag + version
        id: tag
        # Single source of truth for the publish version: the tag
        # name. Below we sed-rewrite pyproject.toml so the package
        # version on the wire always matches the tag, even if the
        # checked-in `version = "..."` field has drifted (which is
        # exactly the failure mode that left v1.3.0-beta.2 unpublished).
        run: |
          tag="${{ inputs.tag }}"
          if [ -z "$tag" ]; then
            tag="$GITHUB_REF_NAME"
          fi
          # Strip leading `v` and PEP-440-normalize the prerelease
          # suffix: `1.3.0-beta.2` → `1.3.0b2`.
          version="${tag#v}"
          pep440=$(echo "$version" | sed -E 's/-alpha\./a/; s/-beta\./b/; s/-rc\./rc/')
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$pep440" >> "$GITHUB_OUTPUT"
          echo "Resolved tag=$tag → PEP 440 version=$pep440"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ steps.tag.outputs.tag }}
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"
      - name: Sync pyproject.toml version from tag
        working-directory: packages/sdk-python
        run: |
          sed -i 's/^version = .*/version = "${{ steps.tag.outputs.version }}"/' pyproject.toml
          echo "After sync:"
          grep '^version' pyproject.toml
      - name: Build aex-sdk
        working-directory: packages/sdk-python
        run: |
          pip install build twine
          python -m build
      - name: Publish to PyPI
        working-directory: packages/sdk-python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload dist/*

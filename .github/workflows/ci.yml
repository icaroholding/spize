name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  rust:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aex
          POSTGRES_PASSWORD: aex_dev
          POSTGRES_DB: aex
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7
      - uses: dtolnay/rust-toolchain@21dc36fb71dd22e3317045c0c31a3f4249868b17  # stable
        with:
          toolchain: stable
          components: clippy, rustfmt
      - name: Rust fmt
        run: cargo fmt --all -- --check
      - name: Rust clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Rust test
        env:
          DATABASE_URL: postgres://aex:aex_dev@localhost:5432/aex
        run: cargo test --workspace

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"
      - name: Install + test aex-sdk
        working-directory: packages/sdk-python
        run: |
          pip install -e ".[dev]"
          pytest -q

  ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "20"
      - name: Install workspace
        # npm 10's handling of rollup's platform-specific optional deps
        # (@rollup/rollup-linux-x64-gnu etc.) is buggy when the committed
        # package-lock.json was generated on a different platform. The
        # lockfile we ship is macOS-generated; deleting it here forces
        # npm to resolve + install the Linux binaries fresh. We trade a
        # tiny amount of reproducibility for CI that doesn't depend on
        # whoever last ran `npm install` locally.
        # Upstream bug: https://github.com/npm/cli/issues/4828
        run: |
          rm -f package-lock.json
          npm install
      - name: Build all packages
        run: npm run build
      - name: Test all packages
        run: npm test

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "20"
      - name: Build web
        working-directory: web
        run: |
          npm install
          npm run build

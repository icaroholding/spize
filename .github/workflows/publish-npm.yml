name: Publish npm packages

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7
      - uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b  # v4.0.3
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Install workspaces
        run: npm install
      - name: Build all packages
        run: npm run build
      - name: Publish @aexproto/sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --workspace=packages/sdk-typescript --access public
      - name: Wait for npm index
        run: sleep 30
      - name: Publish @aexproto/mcp-server
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --workspace=packages/mcp-server --access public

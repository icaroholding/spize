name: Publish npm packages

on:
  push:
    tags:
      - 'v*'

# Authentication: Trusted Publishing via OIDC (no long-lived NPM_TOKEN).
# The registry federates GitHub's workflow identity to a short-lived
# access token at publish time. Setup requirements:
#
# 1. On npmjs.com, for EACH package under @aexproto, configure this
#    workflow as a trusted publisher:
#      https://www.npmjs.com/package/@aexproto/sdk/access
#      https://www.npmjs.com/package/@aexproto/mcp-server/access
#    тЖТ "Add Trusted Publisher" тЖТ GitHub Actions
#    тЖТ Org: icaroholding, Repo: aex, Workflow: publish-npm.yml
#
# 2. The job below sets `permissions: id-token: write` so actions/setup-node
#    can request the OIDC token on our behalf. `--provenance` on npm publish
#    adds a signed attestation tying the tarball to this workflow run.
#
# If trusted publishing is not configured yet, publish fails with
# `ENEEDAUTH` / `403` тАФ configure it on npmjs.com per step 1 above.

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      # Required for OIDC token exchange with the npm registry.
      id-token: write
      # Needed by actions/checkout on public repos (default is already
      # read, but making it explicit helps when reviewing least-
      # privilege audits).
      contents: read
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7
      - uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b  # v4.0.3
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Install workspaces
        run: npm install
      - name: Build all packages
        run: npm run build
      - name: Derive npm dist-tag from git tag
        id: disttag
        # Map `v1.3.0-beta.1` тЖТ `beta`; `v1.2.0-alpha.3` тЖТ `alpha`;
        # `v1.4.0-rc.2` тЖТ `rc`; `v1.3.0` тЖТ `latest`.
        # Prereleases MUST NOT land in the `latest` channel тАФ `npm
        # install @aexproto/sdk` has to keep resolving to the most
        # recent stable, not to whatever beta just shipped. Since
        # `npm@11` this is enforced client-side: publishing a
        # prerelease without an explicit `--tag` fails with
        # `ETARGET` / `must specify a tag`.
        run: |
          version="${GITHUB_REF_NAME#v}"
          case "$version" in
            *-alpha*) tag=alpha ;;
            *-beta*)  tag=beta ;;
            *-rc*)    tag=rc ;;
            *)        tag=latest ;;
          esac
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Resolved dist-tag: $tag (from $GITHUB_REF_NAME)"
      - name: Publish @aexproto/sdk
        run: >
          npm publish
          --workspace=packages/sdk-typescript
          --access public
          --provenance
          --tag ${{ steps.disttag.outputs.tag }}
      - name: Wait for npm index
        run: sleep 30
      - name: Publish @aexproto/mcp-server
        run: >
          npm publish
          --workspace=packages/mcp-server
          --access public
          --provenance
          --tag ${{ steps.disttag.outputs.tag }}

services:
  postgres:
    image: postgres:16-alpine
    container_name: aex-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: aex
      POSTGRES_PASSWORD: aex_dev
      POSTGRES_DB: aex
    ports:
      - "5432:5432"
    volumes:
      - aex_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aex -d aex"]
      interval: 2s
      timeout: 3s
      retries: 20

volumes:
  aex_postgres_data:
    name: aex_postgres_dev_data
